spring.application.name=experimental
# Configuração do Banco de Dados H2 (Em Memória)
spring.datasource.url=jdbc:h2:mem:prefeituradb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Recria a tabela toda vez que o sistema iniciar (ótimo para testes)
spring.jpa.hibernate.ddl-auto=create-drop

# Mostra no console do VS Code os comandos SQL que estão sendo executados
spring.jpa.show-sql=true

# Habilita o console do H2 no navegador
spring.h2.console.enabled=true